<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MasterTrade AI Dashboard</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    background:#000;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1c1c1c;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
}

button{
    width:100%;
    padding:15px;
    font-size:18px;
    background:#00c853;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#00e676;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
}

textarea{
    width:100%;
    height:250px;
    padding:10px;
    margin-top:10px;
    background:#222;
    color:white;
    border:none;
    border-radius:10px;
    resize:none;
}
</style>

</head>

<body>

<header>
MASTERTRADE AI
</header>

<div class="container">

<div class="card">
<h2>Upload Screenshot Chart</h2>
<input type="file" id="chart">
</div>

<div class="card">
<button onclick="analisis()">
ANALISIS CHART
</button>
</div>

<div class="card">
<h2>Hasil Analisis</h2>

<textarea id="hasil" readonly>
Belum ada analisis.
</textarea>

</div>

</div>

<script>

function analisis(){

document.getElementById("hasil").value=

"===== MASTERTRADE AI =====\n\n"+
"Signal : BUY\n"+
"Confidence : 90%\n"+
"Trend : Bullish\n"+
"Momentum : Kuat\n"+
"Market Structure : Higher High\n"+
"Entry : Tunggu Pullback\n"+
"Stop Loss : Swing Low\n"+
"Take Profit 1 : Resistance 1\n"+
"Take Profit 2 : Resistance 2\n"+
"Take Profit 3 : Resistance 3\n\n"+
"Versi ini masih berupa contoh. AI analisis otomatis akan ditambahkan pada langkah berikutnya.";

}

</script>

</body>
</html>
